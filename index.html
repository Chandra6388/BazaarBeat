<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>
    <!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>User Profile Card</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f5f5f5;">
  <table align="center" border="0" cellpadding="0" cellspacing="0" width="600" style="background-color: #ffffff; border:1px solid #ddd; font-family: Arial, sans-serif;">
    <tr>
      <td style="padding: 20px; vertical-align: top; width: 180px; text-align: center;">
        <!-- User Image -->
        <img src="https://via.placeholder.com/100" alt="User Image" style="border-radius: 50%; width: 100px; height: 100px;">
      </td>
      <td style="padding: 20px; vertical-align: top;">
        <!-- User Info -->
        <h2 style="margin: 0; font-size: 24px;">John Doe</h2>
        <p style="margin: 5px 0; color: #555;">john.doe@example.com</p>
        <p style="margin: 5px 0; color: #777;">Software Engineer</p>
      </td>
      <td style="padding: 20px; vertical-align: top; width: 60px;">
        <!-- Social Icons -->
        <a href="#" style="display: block; margin-bottom: 10px;">
          <img src="https://cdn-icons-png.flaticon.com/24/2111/2111463.png" alt="Instagram" style="width: 24px; height: 24px;">
        </a>
        <a href="#" style="display: block; margin-bottom: 10px;">
          <img src="https://cdn-icons-png.flaticon.com/24/145/145807.png" alt="Facebook" style="width: 24px; height: 24px;">
        </a>
        <a href="#" style="display: block;">
          <img src="https://cdn-icons-png.flaticon.com/24/145/145807.png" alt="LinkedIn" style="width: 24px; height: 24px;">
        </a>
      </td>
    </tr>
    <tr>
      <td colspan="3" style="padding: 20px; text-align: center;">
        <!-- Buttons -->
        <a href="#" style="display: inline-block; margin: 0 10px; padding: 10px 20px; background-color: #007BFF; color: #ffffff; text-decoration: none; border-radius: 5px;">Call Me</a>
        <a href="#" style="display: inline-block; margin: 0 10px; padding: 10px 20px; background-color: #28A745; color: #ffffff; text-decoration: none; border-radius: 5px;">Book Meeting</a>
      </td>
    </tr>
  </table>
</body>
</html>

    
</body>
</html>
