 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
    <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background: #ffffff; padding: 20px; font-family: Arial, sans-serif; color: #333;">
        <tr>
          <!-- Left Content -->
          <td align="center" valign="top" style="width: 30%; padding: 20px;">
            <img src="https://via.placeholder.com/150" alt="User Image" width="120" height="120" style="border-radius: 50%; border: 3px solid #007BFF; box-shadow: 0 0 10px rgba(0,0,0,0.1); display: block;">
          </td>
      
          <!-- Right Content -->
          <td align="left" valign="top" style="width: 70%; padding: 20px;">
            
            <!-- Name and Details -->
            <h2 style="margin: 0 0 10px; font-size: 24px; color: #007BFF;">John Doe</h2>
            <p style="margin: 0 0 5px; font-size: 16px;">Email: john@example.com</p>
            <p style="margin: 0 0 5px; font-size: 16px;">Job Title: Software Engineer</p>
            
            <!-- Social Media Icons -->
            <table cellpadding="0" cellspacing="0" border="0" style="margin-top: 15px;">
              <tr>
                <td style="padding: 0 5px;">
                  <a href="#"><img src="https://cdn-icons-png.flaticon.com/24/2111/2111463.png" alt="LinkedIn" width="24" height="24" style="display: block;"></a>
                </td>
                <td style="padding: 0 5px;">
                  <a href="#"><img src="https://cdn-icons-png.flaticon.com/24/733/733579.png" alt="Facebook" width="24" height="24" style="display: block;"></a>
                </td>
                <td style="padding: 0 5px;">
                  <a href="#"><img src="https://cdn-icons-png.flaticon.com/24/733/733558.png" alt="Instagram" width="24" height="24" style="display: block;"></a>
                </td>
                <td style="padding: 0 5px;">
                  <a href="#"><img src="https://cdn-icons-png.flaticon.com/24/2111/2111728.png" alt="Twitter" width="24" height="24" style="display: block;"></a>
                </td>
                <td style="padding: 0 5px;">
                  <a href="#"><img src="https://cdn-icons-png.flaticon.com/24/733/733585.png" alt="YouTube" width="24" height="24" style="display: block;"></a>
                </td>
              </tr>
            </table>
      
            <!-- Buttons -->
            <table cellpadding="0" cellspacing="0" border="0" style="margin-top: 20px;">
              <tr>
                <td align="center" style="padding: 5px;">
                  <a href="#" style="background: #007BFF; color: #ffffff; padding: 10px 20px; text-decoration: none; border-radius: 30px; font-size: 14px;">Call Me</a>
                </td>
                <td align="center" style="padding: 5px;">
                  <a href="#" style="background: #28A745; color: #ffffff; padding: 10px 20px; text-decoration: none; border-radius: 30px; font-size: 14px;">Book Meeting</a>
                </td>
                <td align="center" style="padding: 5px;">
                  <a href="#" style="background: #FFC107; color: #ffffff; padding: 10px 20px; text-decoration: none; border-radius: 30px; font-size: 14px;">Visit Website</a>
                </td>
                <td align="center" style="padding: 5px;">
                  <a href="#" style="background: #DC3545; color: #ffffff; padding: 10px 20px; text-decoration: none; border-radius: 30px; font-size: 14px;">Email Me</a>
                </td>
                <td align="center" style="padding: 5px;">
                  <a href="#" style="background: #6F42C1; color: #ffffff; padding: 10px 20px; text-decoration: none; border-radius: 30px; font-size: 14px;">Connect</a>
                </td>
              </tr>
            </table>
      
          </td>
        </tr>
      </table>
      
 </body>
 </html>
